;==========================================================
; POLYBAR - TOKYO DARK DEEP REFINED
;==========================================================

[colors]
background = #090a13
background-alt = #151726
foreground = #d2d8ff
primary = #7aa2f7
secondary = #7dcfff
accent = #bb9af7
alert = #f7768e
success = #9ece6a
muted = #565f89


[bar/bar1]
width = 98%
height = 30
offset-x = 1%
offset-y = 0.5
fixed-center = true
bottom = false
radius = 10

background = #aa090a13
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1
separator-foreground = ${colors.muted}

font-0 = "Fira Code:size=11;2"
font-1 = "Hack Nerd Font Mono:size=18;4:"
font-2 = "JetBrainsMono Nerd Font:size=14;2"

modules-left = date networkW networkE target
modules-center = xworkspaces
modules-right = vpn battery pulseaudio memory cpu xkeyboard

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true


[module/xworkspaces]
type = internal/xworkspaces

label-active = ""
label-active-foreground = ${colors.primary}
label-active-padding = 1

label-occupied = ""
label-occupied-foreground = ${colors.secondary}
label-occupied-padding = 1

label-urgent = ""
label-urgent-background = ${colors.alert}
label-urgent-foreground = #ffffff
label-urgent-padding = 1

label-empty = ""
label-empty-foreground = ${colors.muted}
label-empty-padding = 1


[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.foreground}


[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <ramp-volume><label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.primary}
label-volume-padding = 1

label-muted = MUTE
label-muted-foreground = ${colors.alert}

ramp-volume-0 = 奄
ramp-volume-1 = 奔
ramp-volume-2 = 奔
ramp-volume-3 = 墳
ramp-volume-4 = 墳
ramp-volume-foreground = ${colors.accent}


[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = #bb9af7
label = %percentage_used:2%%
label-foreground = #7aa2f7


[module/cpu]
type = internal/cpu
interval = 2
label = %{F#bb9af7}%{F-}%{F#7aa2f7} %percentage:2%%%{F-}


[module/networkW]
type = internal/network
interface = wlan0
interface-type = wireless
interval = 3

format-connected = %{F#bb9af7}%{F-}<label-connected>
label-connected = %local_ip%
label-connected-foreground = ${colors.primary}
label-connected-padding = 1


[module/networkE]
type = internal/network
interface = eth0
interval = 3

format-connected = %{F${colors.accent}}󰈀%{F-}<label-connected>
label-connected = %local_ip%
label-connected-foreground = ${colors.secondary}
label-connected-padding = 1


[module/date]
type = internal/date
interval = 1
date = %H:%M
format = <label>
label = %date%
label-foreground = ${colors.primary}


[module/battery]

type = internal/battery
full-at = 100
low-at = 5

battery = BAT0
adapter = ADP1

poll-interval = 5

format-charging = <animation-charging><label-charging>
format-discharging = <ramp-capacity><label-discharging>
format-full = <label-full>
format-low = <label-low>
label-discharging = %percentage%%
label-discharging-padding = 1
label-discharging-foreground = #7aa2f7
label-charging = %percentage%%
label-charging-padding = 1
label-charging-foreground = #7aa2f7
label-full =  %{F#bb9af7}%{F-}%{F#7aa2f7} %percentage%%
label-low = %{F#b48f8f}!%{F-}%{F#cda8a8} %percentage%%


ramp-capacity-0 =  
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-5 = 
ramp-capacity-6 = 
ramp-capacity-7 = 
ramp-capacity-8 = 
ramp-capacity-9 = 
; Only applies if <bar-capacity> is used
ramp-capacity-foreground = #bb9af7
bar-capacity-width = 10

; Only applies if <animation-charging> is used
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-5 = 
animation-charging-6 = 
animation-charging-7 = 
animation-charging-8 = 
animation-charging-9 = 
animation-charging-foreground = #bb9af7

; Framerate in milliseconds
animation-charging-framerate = 750

animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 100


[module/xkeyboard]
type = internal/xkeyboard
format-prefix = " "
format-prefix-foreground = ${colors.accent}
label-layout = %layout%
label-layout-foreground = ${colors.primary}


[module/vpn]
type = custom/script
interval = 1
exec = ~/.config/bspwm/scripts/vpn_status.sh
tail = true


[module/target]
type = custom/script
interval = 1
exec = ~/.config/bspwm/scripts/target_to_hack.sh
tail = true


[settings]
screenchange-reload = true
pseudo-transparency = true

